# Uncomment for local editing without GitHub:
local_backend: true

backend:
  name: github
  repo: rewelser/BluTattoo         # ← change me
  branch: main                             # ← change if not main
  site_domain: blu-tattoo.vercel.app              # ← your production domain (no protocol)
  base_url: https://blu-tattoo.vercel.app         # ← your production URL (with protocol)
  auth_endpoint: oauth                     # ← provided by the integration

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "faqs"
    label: "FAQs"
    folder: "src/content/faqs"
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: q, label: "Question", widget: string }
      - { name: a, label: "Answer", widget: text }
      - { name: sort, label: "Sort", widget: number, required: false }

  - name: "people"
    label: "Team Members"
    description: "Add new resident team members here: tattoo artists, piercers, etc."
    folder: "src/content/people"
    create: true
    identifier_field: name
    slug: "{{slug}}"
    media_folder: "/public/uploads/people"
    public_folder: "/uploads/people"
    fields:
      - { name: name, label: "Name", widget: string }
      - { name: active, label: "Active", widget: boolean, default: true, required: true }
      - { name: guest, label: "Guest", widget: boolean, default: false, required: true }
      - { name: order, label: "List Order", widget: number, default: 999 }
      - { name: pagePhoto, label: "Photo (on Artist or Piercing Page)", widget: image, required: false }
      - { name: runwayPhoto, label: "Runway Photo (Front Page)", widget: image, required: false }
      - name: primaryRole
        label: Primary Role
        widget: select
        options:
          - { label: "Tattoo Artist", value: "Tattoo Artist" }
          - { label: "Piercer", value: "Piercer" }

      - name: "contactSocialsBooking"
        label: "Contact, Socials, & Booking"
        widget: "object"
        required: false
        collapsed: false
        fields:
        - { name: bookingProfilePicture, label: "Profile Picture (Booking Page)", widget: image, required: false }
        - { name: booksOpen, label: "Are books open?", widget: boolean, default: true, required: true }
        - { name: booksClosedNote, label: "Closed Books Note", widget: text, required: true, default: "Books are currently closed.", hint: "Only active when books are not open. eg: 'books closed until April'"}
        - name: contact
          label: "Contact"
          widget: list
          min: 0
          types:
            - name: "phone"
              label: "phone"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: href, label: "Phone Number", widget: string, required: true }
                - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                - { name: notes, label: Notes, widget: text, required: false, hint: "number type, text or call, times available, etc"}

            - name: "email"
              label: "email"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: href, label: "Email Address", widget: string, required: true }
                - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                - { name: notes, label: Notes, widget: text, required: false, hint: "lead times, subject header, etc"}

            - name: "website"
              label: "website"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: href, label: "URL", widget: string, required: true }
                - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                - { name: notes, label: Notes, widget: text, required: false, hint: "external website"}

        - name: socials
          label: "Social Media Links"
          widget: list
          min: 0
          types:
            - name: "instagram"
              label: "Instagram"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: href, label: "URL", widget: string, required: true }
                - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                - { name: bookable, label: "Allow Contact?", widget: boolean, default: false, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                - { name: handle, label: "Username/Handle", widget: text, required: false }

            - name: "facebook"
              label: "Facebook"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: href, label: "URL", widget: string, required: true }
                - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                - { name: bookable, label: "Allow Contact?", widget: boolean, default: false, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                - { name: handle, label: "Username/Handle", widget: text, required: false }

            - name: "tiktok"
              label: "TikTok"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: href, label: "URL", widget: string, required: true }
                - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                - { name: bookable, label: "Allow Contact?", widget: boolean, default: false, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                - { name: handle, label: "Username/Handle", widget: text, required: false }

            - name: "x"
              label: "X (Twitter)"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: href, label: "URL", widget: string, required: true }
                - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                - { name: bookable, label: "Allow Contact?", widget: boolean, default: false, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                - { name: handle, label: "Username/Handle", widget: text, required: false }

            - name: "threads"
              label: "Threads"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: href, label: "URL", widget: string, required: true }
                - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                - { name: bookable, label: "Allow Contact?", widget: boolean, default: false, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                - { name: handle, label: "Username/Handle", widget: text, required: false }

            - name: "tumblr"
              label: "Tumblr"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: href, label: "URL", widget: string, required: true }
                - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                - { name: bookable, label: "Allow Contact?", widget: boolean, default: false, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                - { name: handle, label: "Username/Handle", widget: text, required: false }

            - name: "youtube"
              label: "YouTube"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: href, label: "URL", widget: string, required: true }
                - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                - { name: bookable, label: "Allow Contact?", widget: boolean, default: false, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                - { name: handle, label: "Username/Handle", widget: text, required: false }

            - name: "pinterest"
              label: "Pinterest"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: href, label: "URL", widget: string, required: true }
                - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                - { name: bookable, label: "Allow Contact?", widget: boolean, default: false, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                - { name: handle, label: "Username/Handle", widget: text, required: false }

        - name: platforms
          label: "Platforms"
          widget: list
          min: 0
          types:
          - name: square
            label: "Square Appointments"
            widget: object
            required: true
            collapsed: false
            fields:
              - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
              - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
              - name: linkOrModuleInfo
                label: "Simple link or Square module info"
                widget: list
                min: 1
                types:
                - name: platformUrl
                  label: "Square Link"
                  widget: object
                  required: true
                  fields:
                  - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                  - { name: href, label: "URL", widget: string, required: true }

                - name: moduleInfo
                  label: "Module Info"
                  widget: object
                  fields:
                  - name: enabled
                    label: "Enabled?"
                    widget: boolean
                    required: true
                    default: true
                    hint: "Toggle on to show the Square Appointments embed on this person's page &/ booking section."
                  - name: merchantId
                    label: "Merchant ID"
                    widget: string
                    required: true
                    hint: "From your Square embed snippet (e.g., 'DM7VKY8Q63GNP')."
                    pattern: ['^[A-Za-z0-9-]+$', "Use letters, numbers, and dashes. Case-sensitive."]
                  - name: locationId
                    label: "Location ID"
                    widget: string
                    required: true
                    hint: "From your Square embed snippet (e.g., '7WQ0KXC8ZSD90')."
                    pattern: ['^[A-Za-z0-9-]+$', "Use letters, numbers, and dashes. Case-sensitive."]
                  - name: label
                    label: "Button Label"
                    widget: string
                    required: false
                    default: "Book an appointment"

        - name: bookingNote
          label: "General Booking Note"
          widget: "text"
          required: false
          hint: "Example: 'For tattoo inquiries, Sierra prefers Facebook Messenger.'"

      - name: images
        label: "Portfolio Images"
        widget: list
        required: false
        fields:
          - { name: src, label: "Image", widget: image }
          - { name: alt, label: "Alt text", widget: string, required: false }

      - { name: body, label: "Long Bio (Page Content)", widget: markdown, required: false }

  - name: "aftercare"
    label: "Aftercare"
    files:
      - name: "main"
        label: "Aftercare Content"
        file: "src/content/aftercare/main.md"
        format: "frontmatter"
        fields:
          - { name: title, label: Title, widget: string, default: "Aftercare" }
          - { name: body, label: Body, widget: markdown }

  - name: "siteInfo"
    label: "Site Info"
    files:
      - name: "main"
        label: "Main"
        file: "src/content/siteInfo/main.json"
        format: "json"
        fields:
          - { name: siteName, label: "Site Name", widget: string, default: "BluTattoo Studio" }
          - { name: address, label: "Address (single line)", widget: string }
          - { name: phone, label: "Phone", widget: string, required: false }
          - { name: email, label: "Email", widget: string, required: false }

          - name: hours
            label: "Hours"
            widget: list
            required: false
            fields:
              - { name: label, label: "Day", widget: string }
              - { name: value, label: "Hours", widget: string }

          - name: socials
            label: "Socials"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - { name: instagram, label: "Instagram", widget: "string", required: false }
              - { name: tiktok, label: "TikTok", widget: "string", required: false }
              - { name: youtube, label: "YouTube", widget: "string", required: false }
              - { name: facebook, label: "Facebook", widget: "string", required: false }
              - { name: x, label: "X (Twitter)", widget: "string", required: false }
              - { name: threads, label: "Threads", widget: "string", required: false }
              - { name: tumblr, label: "Tumblr", widget: "string", required: false }
              - { name: pinterest, label: "Pinterest", widget: "string", required: false }

  - name: "branding"
    label: "Branding"
    files:
      - name: "main"
        label: "Branding"
        file: "src/content/branding.json"
        format: "json"
        fields:
          - name: logoDark
            label: "Logo (SVG or PNG, dark version)"
            widget: image
            required: true
            hint: "Header logo (dark-on-light version)."
            media_folder: "public/uploads/misc_images/logos"
            public_folder: "/uploads/misc_images/logos"

          - name: logoLight
            label: "Logo (SVG or PNG, light version)"
            widget: image
            required: false
            hint: "Header logo (light-on-dark version)."
            media_folder: "public/uploads/misc_images/logos"
            public_folder: "/uploads/misc_images/logos"

          - name: hero
            label: "Hero"
            widget: object
            required: false
            fields:
              - name: video
                label: "Video"
                widget: object
                required: false
                fields:
                  - name: mp4
                    label: "MP4"
                    widget: file
                    required: true
                    hint: "Fallback format for most browsers."
                    media_folder: "public/uploads/misc_videos"
                    public_folder: "/uploads/misc_videos"

                  - name: webm
                    label: "WebM"
                    widget: file
                    required: false
                    hint: "Smaller/faster in supported browsers."
                    media_folder: "public/uploads/misc_videos"
                    public_folder: "/uploads/misc_videos"

                  - name: poster
                    label: "Poster image"
                    widget: image
                    required: false
                    hint: "Shown before video loads / if autoplay fails."
                    media_folder: "public/uploads/misc_images"
                    public_folder: "/uploads/misc_images"

  - name: "home"
    label: "Homepage"
    files:
      - name: "main"
        label: "Homepage Content"
        file: "src/content/home/main.json"
        format: "json"
        fields:
          - name: promoMain
            label: "Promo (main)"
            widget: object
            required: false
            collapsed: true
            hint: "Toggle on to put a promo image on the home page."
            fields:
              - { name: promoEnabled, label: "Enable Promo", widget: boolean, default: true }

              - name: promoImage
                label: "Promo Image"
                widget: image
                required: false
                media_folder: "/public/uploads/promos"
                public_folder: "/uploads/promos"
                hint: "Recommended: wide image (e.g. 1600×900+)"

              - { name: promoAlt, label: "Image Alt Text", widget: string, required: false }

  - name: "eventsActive"
    label: "Events (Active)"
    folder: "src/content/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: "frontmatter"
    filter: { field: "archived", value: false }
    summary: "{{startDate}} — {{title}}"
    sortable_fields: ["startDate", "title", "commit_date"]
    description: "Create events for guest spots, flash days, and other shop happenings."
    fields:
      - name: guestSpot
        label: Is This Event a Guest Spot?
        summary: "{{guestName}}"
        hint: "(If not, you can ignore this section.)"
        label_singular: "guest spot"
        widget: list
        min: 1
        max: 1
        types:
          - name: guestInfo
            label: "Guest Info"
            widget: object
            fields:
              - { name: guestName, label: "Guest Name", widget: string }
              - name: primaryRole
                label: "Primary Role"
                widget: select
                options:
                - { label: "Tattoo Artist", value: "Tattoo Artist" }
                - { label: "Piercer", value: "Piercer" }
              - { name: runwayPhoto, label: "Runway Photo (Front Page)", widget: image, required: false }
              - label: "Socials"
                name: socials
                widget: "object"
                required: false
                collapsed: true
                fields:
                  - { name: instagram, label: "Instagram", widget: "string", required: false }
                  - { name: tiktok, label: "TikTok", widget: "string", required: false }
                  - { name: youtube, label: "YouTube", widget: "string", required: false }
                  - { name: facebook, label: "Facebook", widget: "string", required: false }
                  - { name: x, label: "X (Twitter)", widget: "string", required: false }
                  - { name: threads, label: "Threads", widget: "string", required: false }
                  - { name: tumblr, label: "Tumblr", widget: "string", required: false }
                  - { name: pinterest, label: "Pinterest", widget: "string", required: false }

      - { name: title, label: Title, widget: string }
      - { name: detailsShort, label: Details (short), widget: string, required: false }
      - name: image
        label: "Event Image"
        widget: image
        required: false
        media_folder: "/public/uploads/events"
        public_folder: "/uploads/events"
      - { name: alt, label: "Event Image Alt Text", widget: string, required: false }
      - { name: published, label: "Published", widget: boolean, default: true }
      - { name: featured, label: "Featured", widget: boolean, required: false, default: false }
      - { name: archived, label: "Archived", widget: boolean, required: false, default: false }

      # DATE RANGE (inclusive endDate)
      - name: startDate
        label: "Start Date"
        widget: datetime
        date_format: "YYYY-MM-DD"
        time_format: false
        # picker_utc: false  # optional

      - name: endDate
        label: "End Date (inclusive, optional)"
        widget: datetime
        required: false
        date_format: "YYYY-MM-DD"
        time_format: false
        # picker_utc: false  # optional

      # OPTIONAL TIME WINDOW (if omitted => all-day)
      - name: startTime
        label: "Start Time (optional)"
        widget: datetime
        required: false
        date_format: false
        time_format: "HH:mm"

      - name: endTime
        label: "End Time (optional)"
        widget: datetime
        required: false
        date_format: false
        time_format: "HH:mm"

      - { name: location, label: "Location", widget: string, required: false }

      - name: recurrenceRule
        label: "Recurrence (optional - add only one rule)"
        widget: list
        min: 0
        max: 1
        types:
          - name: recurrenceRuleWeekly
            label: "Recurrence - Weekly"
            widget: object
            required: false
            collapsed: true
            hint: "Repeats on selected weekdays between Start Date and End Date."
            fields:
              - name: interval
                label: "Interval"
                widget: number
                required: false
                default: 1
                value_type: int
                min: 1
                hint: "Every 1 week, every 2 weeks, etc."

              - name: byWeekday
                label: "Weekdays"
                widget: select
                multiple: true
                required: true
                options:
                  - { label: Mon, value: MO }
                  - { label: Tue, value: TU }
                  - { label: Wed, value: WE }
                  - { label: Thu, value: TH }
                  - { label: Fri, value: FR }
                  - { label: Sat, value: SA }
                  - { label: Sun, value: SU }

          - name: recurrenceRuleMonthly
            label: "Recurrence - Monthly"
            widget: object
            required: false
            collapsed: true
            hint: "Repeats monthly between Start Date and End Date."
            fields:
              - name: interval
                label: "Interval"
                widget: number
                required: false
                default: 1
                value_type: int
                min: 1
                hint: "Every 1 month, every 2 months, etc."

              - name: monthlyMode
                label: "Monthly Mode"
                widget: select
                required: true
                default: monthday
                options:
                  - { label: "Same day of month", value: monthday }
                  - { label: "Ordinal weekday", value: ordinalWeekday }

              - name: byMonthDay
                label: "Day of month"
                widget: number
                required: false
                value_type: int
                min: 1
                max: 31
                hint: "Use for 'Same day of month' mode, e.g. 15"

              - name: byWeekday
                label: "Weekday"
                widget: select
                required: false
                options:
                  - { label: "Mon", value: MO }
                  - { label: "Tue", value: TU }
                  - { label: "Wed", value: WE }
                  - { label: "Thu", value: TH }
                  - { label: "Fri", value: FR }
                  - { label: "Sat", value: SA }
                  - { label: "Sun", value: SU }
                hint: "Use for 'Ordinal weekday' mode"

              - name: bySetPos
                label: "Position in month"
                widget: select
                required: false
                options:
                  - { label: "First", value: 1 }
                  - { label: "Second", value: 2 }
                  - { label: "Third", value: 3 }
                  - { label: "Fourth", value: 4 }
                  - { label: "Last", value: -1 }
                hint: "Use for 'Ordinal weekday' mode"

      - name: promoBar
        label: "Promo Bar"
        widget: object
        required: false
        collapsed: true
        fields:
          - { name: enabled, label: "Enable Promo Bar", widget: boolean, default: false }
          - { name: message, label: "Message", widget: string, required: false }
          - { name: href, label: "Link URL", widget: string, required: false }

          - name: color1
            label: "Color 1"
            widget: color
            required: false
            hint: "If only one color is set, bar uses a solid background."

          - name: color2
            label: "Color 2"
            widget: color
            required: false
            hint: "If two colors are set, bar uses a left→right gradient."

      - { name: body, label: "Details (long - event page)", widget: markdown, required: false }

  - name: "eventsArchive"
    label: "Events (Archive)"
    folder: "src/content/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: "frontmatter"
    filter: { field: "archived", value: true }
    summary: "{{startDate}} — {{title}}"
    sortable_fields: ["startDate", "title", "commit_date"]
    description: "Create events for guest spots, flash days, and other shop happenings."
    fields:
      - name: guestSpot
        label: Is This Event a Guest Spot?
        summary: "{{guestName}}"
        hint: "(If not, you can ignore this section.)"
        label_singular: "guest spot"
        widget: list
        min: 1
        max: 1
        types:
          - name: guestInfo
            label: "Guest Info"
            widget: object
            fields:
              - { name: guestName, label: "Guest Name", widget: string }
              - name: primaryRole
                label: "Primary Role"
                widget: select
                options:
                - { label: "Tattoo Artist", value: "Tattoo Artist" }
                - { label: "Piercer", value: "Piercer" }
              - { name: runwayPhoto, label: "Runway Photo (Front Page)", widget: image, required: false }
              - label: "Socials"
                name: socials
                widget: "object"
                required: false
                collapsed: true
                fields:
                  - { name: instagram, label: "Instagram", widget: "string", required: false }
                  - { name: tiktok, label: "TikTok", widget: "string", required: false }
                  - { name: youtube, label: "YouTube", widget: "string", required: false }
                  - { name: facebook, label: "Facebook", widget: "string", required: false }
                  - { name: x, label: "X (Twitter)", widget: "string", required: false }
                  - { name: threads, label: "Threads", widget: "string", required: false }
                  - { name: tumblr, label: "Tumblr", widget: "string", required: false }
                  - { name: pinterest, label: "Pinterest", widget: "string", required: false }

      - { name: title, label: Title, widget: string }
      - { name: detailsShort, label: Details (short), widget: string, required: false }
      - name: image
        label: "Event Image"
        widget: image
        required: false
        media_folder: "/public/uploads/events"
        public_folder: "/uploads/events"
      - { name: alt, label: "Event Image Alt Text", widget: string, required: false }
      - { name: published, label: "Published", widget: boolean, default: true }
      - { name: featured, label: "Featured", widget: boolean, required: false, default: false }
      - { name: archived, label: "Archived", widget: boolean, required: false, default: false }

      # DATE RANGE (inclusive endDate)
      - name: startDate
        label: "Start Date"
        widget: datetime
        date_format: "YYYY-MM-DD"
        time_format: false
        # picker_utc: false  # optional

      - name: endDate
        label: "End Date (inclusive, optional)"
        widget: datetime
        required: false
        date_format: "YYYY-MM-DD"
        time_format: false
        # picker_utc: false  # optional

      # OPTIONAL TIME WINDOW (if omitted => all-day)
      - name: startTime
        label: "Start Time (optional)"
        widget: datetime
        required: false
        date_format: false
        time_format: "HH:mm"

      - name: endTime
        label: "End Time (optional)"
        widget: datetime
        required: false
        date_format: false
        time_format: "HH:mm"

      - { name: location, label: "Location", widget: string, required: false }

      - name: recurrenceRule
        label: "Recurrence (optional - add only one rule)"
        widget: list
        min: 0
        max: 1
        types:
          - name: recurrenceRuleWeekly
            label: "Recurrence - Weekly"
            widget: object
            required: false
            collapsed: true
            hint: "Repeats on selected weekdays between Start Date and End Date."
            fields:
              - name: interval
                label: "Interval"
                widget: number
                required: false
                default: 1
                value_type: int
                min: 1
                hint: "Every 1 week, every 2 weeks, etc."

              - name: byWeekday
                label: "Weekdays"
                widget: select
                multiple: true
                required: true
                options:
                  - { label: Mon, value: MO }
                  - { label: Tue, value: TU }
                  - { label: Wed, value: WE }
                  - { label: Thu, value: TH }
                  - { label: Fri, value: FR }
                  - { label: Sat, value: SA }
                  - { label: Sun, value: SU }

          - name: recurrenceRuleMonthly
            label: "Recurrence - Monthly"
            widget: object
            required: false
            collapsed: true
            hint: "Repeats monthly between Start Date and End Date."
            fields:
              - name: interval
                label: "Interval"
                widget: number
                required: false
                default: 1
                value_type: int
                min: 1
                hint: "Every 1 month, every 2 months, etc."

              - name: monthlyMode
                label: "Monthly Mode"
                widget: select
                required: true
                default: monthday
                options:
                  - { label: "Same day of month", value: monthday }
                  - { label: "Ordinal weekday", value: ordinalWeekday }

              - name: byMonthDay
                label: "Day of month"
                widget: number
                required: false
                value_type: int
                min: 1
                max: 31
                hint: "Use for 'Same day of month' mode, e.g. 15"

              - name: byWeekday
                label: "Weekday"
                widget: select
                required: false
                options:
                  - { label: "Mon", value: MO }
                  - { label: "Tue", value: TU }
                  - { label: "Wed", value: WE }
                  - { label: "Thu", value: TH }
                  - { label: "Fri", value: FR }
                  - { label: "Sat", value: SA }
                  - { label: "Sun", value: SU }
                hint: "Use for 'Ordinal weekday' mode"

              - name: bySetPos
                label: "Position in month"
                widget: select
                required: false
                options:
                  - { label: "First", value: 1 }
                  - { label: "Second", value: 2 }
                  - { label: "Third", value: 3 }
                  - { label: "Fourth", value: 4 }
                  - { label: "Last", value: -1 }
                hint: "Use for 'Ordinal weekday' mode"

      - name: promoBar
        label: "Promo Bar"
        widget: object
        required: false
        collapsed: true
        fields:
          - { name: enabled, label: "Enable Promo Bar", widget: boolean, default: false }
          - { name: message, label: "Message", widget: string, required: false }
          - { name: href, label: "Link URL", widget: string, required: false }

          - name: color1
            label: "Color 1"
            widget: color
            required: false
            hint: "If only one color is set, bar uses a solid background."

          - name: color2
            label: "Color 2"
            widget: color
            required: false
            hint: "If two colors are set, bar uses a left→right gradient."

      - { name: body, label: "Details (long - event page)", widget: markdown, required: false }


  - name: "imagetest"
    label: "Image Test"
    folder: "src/content/imagetest"
    create: true
    slug: "{{slug}}"
