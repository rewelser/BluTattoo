# Uncomment for local editing without GitHub:
local_backend: true

backend:
  name: github
  repo: rewelser/BluTattoo         # ← change me
  branch: main                             # ← change if not main
  site_domain: blu-tattoo.vercel.app              # ← your production domain (no protocol)
  base_url: https://blu-tattoo.vercel.app         # ← your production URL (with protocol)
  auth_endpoint: oauth                     # ← provided by the integration

media_folder: "public/uploads"
public_folder: "/uploads"

output:
  omit_empty_optional_fields: true

collections:
  - name: "faqs"
    label: "FAQs"
    folder: "src/content/faqs"
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: q, label: "Question", widget: string }
      - { name: a, label: "Answer", widget: text }
      - { name: sort, label: "Sort", widget: number, required: false }

  - name: "people"
    label: "Team Members"
    description: "Add new resident team members here: tattoo artists, piercers, etc."
    folder: "src/content/people"
    path: "{{slug}}/index"
    media_folder: "assets/images"
    public_folder: "assets/images"
    create: true
    identifier_field: name
    slug: "{{slug}}"
    fields:
      - { name: name, label: "Name", widget: string }
      - { name: active, label: "Active", widget: boolean, default: true, required: true }
      - { name: order, label: "List Order", widget: number, default: 999 }
      - { name: pagePhoto, label: "Photo (on Artist or Piercing Page)", widget: image, required: false }
      - { name: runwayPhoto, label: "Runway Photo (Front & All Artists Page)", widget: image, required: false }
      - name: runwayPhotoFrame
        label: "Frame for Runway Photo"
        widget: select
        options: ["none", "roundframe1", "roundframe2", "roundframe3", "roundframe4", "squareframe1", "squareframe2", "squareframe3", "archedframe1"]
        default: "none"
      - name: primaryRole
        label: "Primary Role"
        widget: select
        options:
          - { label: "Tattoo Artist", value: "Tattoo Artist" }
          - { label: "Piercer", value: "Piercer" }

      - name: "contactSocialsBooking"
        label: "Contact, Socials, & Booking"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { name: bookingProfilePicture, label: "Profile Picture (Booking Page)", widget: image, required: false }
          - { name: booksOpen, label: "Are books open?", widget: boolean, default: true, required: true }
          - { name: booksClosedNote, label: "Closed Books Note", widget: text, required: true, default: "Books are currently closed.", hint: "Only active when books are not open. eg: 'books closed until April'" }
          - name: contact
            label: "Contact"
            required: false
            widget: list
            min: 0
            types:
              - name: "phone"
                label: "phone"
                widget: object
                required: true
                collapsed: false
                fields:
                  - name: href
                    label: "Phone Number"
                    widget: string
                    required: true
                    hint: "Enter a 10-digit US number including area code. Example: (555) 123-4567"
                    pattern:
                      [
                        "^(?:\\+?1[-.\\s]?)?(?:\\(?\\d{3}\\)?[-.\\s]?)\\d{3}[-.\\s]?\\d{4}$",
                        "Enter a valid US phone number with area code, such as (555) 123-4567 or 555-123-4567."
                      ]
                  - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                  - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                  - { name: notes, label: Notes, widget: text, required: false, hint: "number type, text or call, times available, etc" }

              - name: "email"
                label: "email"
                widget: object
                required: true
                collapsed: false
                fields:
                  - { name: href, label: "Email Address", widget: string, required: true }
                  - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                  - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                  - { name: notes, label: Notes, widget: text, required: false, hint: "lead times, subject header, etc" }

              - name: "website"
                label: "website"
                widget: object
                required: true
                collapsed: false
                fields:
                  - { name: href, label: "URL", widget: string, required: true }
                  - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                  - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                  - { name: notes, label: Notes, widget: text, required: false, hint: "external website" }

          - name: socials
            label: "Social Media Links"
            required: false
            widget: list
            min: 0
            types:
              - name: "instagram"
                label: "Instagram"
                widget: object
                required: true
                collapsed: false
                fields:
                  - { name: href, label: "URL", widget: string, required: true }
                  - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                  - { name: bookable, label: "List as a bookable channel of communication?", widget: boolean, default: false, required: true }
                  - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                  - { name: handle, label: "Username/Handle", widget: text, required: false }

              - name: "facebook"
                label: "Facebook"
                widget: object
                required: true
                collapsed: false
                fields:
                  - { name: href, label: "URL", widget: string, required: true }
                  - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                  - { name: bookable, label: "List as a bookable channel of communication?", widget: boolean, default: false, required: true }
                  - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                  - { name: handle, label: "Username/Handle", widget: text, required: false }

              - name: "tiktok"
                label: "TikTok"
                widget: object
                required: true
                collapsed: false
                fields:
                  - { name: href, label: "URL", widget: string, required: true }
                  - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                  - { name: bookable, label: "List as a bookable channel of communication?", widget: boolean, default: false, required: true }
                  - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                  - { name: handle, label: "Username/Handle", widget: text, required: false }

              - name: "x"
                label: "X (Twitter)"
                widget: object
                required: true
                collapsed: false
                fields:
                  - { name: href, label: "URL", widget: string, required: true }
                  - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                  - { name: bookable, label: "List as a bookable channel of communication?", widget: boolean, default: false, required: true }
                  - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                  - { name: handle, label: "Username/Handle", widget: text, required: false }

              - name: "threads"
                label: "Threads"
                widget: object
                required: true
                collapsed: false
                fields:
                  - { name: href, label: "URL", widget: string, required: true }
                  - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                  - { name: bookable, label: "List as a bookable channel of communication?", widget: boolean, default: false, required: true }
                  - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                  - { name: handle, label: "Username/Handle", widget: text, required: false }

              - name: "tumblr"
                label: "Tumblr"
                widget: object
                required: true
                collapsed: false
                fields:
                  - { name: href, label: "URL", widget: string, required: true }
                  - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                  - { name: bookable, label: "List as a bookable channel of communication?", widget: boolean, default: false, required: true }
                  - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                  - { name: handle, label: "Username/Handle", widget: text, required: false }

              - name: "youtube"
                label: "YouTube"
                widget: object
                required: true
                collapsed: false
                fields:
                  - { name: href, label: "URL", widget: string, required: true }
                  - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                  - { name: bookable, label: "List as a bookable channel of communication?", widget: boolean, default: false, required: true }
                  - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                  - { name: handle, label: "Username/Handle", widget: text, required: false }

              - name: "pinterest"
                label: "Pinterest"
                widget: object
                required: true
                collapsed: false
                fields:
                  - { name: href, label: "URL", widget: string, required: true }
                  - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                  - { name: bookable, label: "List as a bookable channel of communication?", widget: boolean, default: false, required: true }
                  - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                  - { name: handle, label: "Username/Handle", widget: text, required: false }

          - name: platforms
            label: "Platforms"
            required: false
            widget: list
            min: 0
            types:
              - name: square
                label: "Square Appointments"
                widget: object
                required: true
                collapsed: false
                fields:
                  - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                  - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                  - name: linkOrModuleInfo
                    label: "Simple link or Square module info"
                    widget: list
                    min: 1
                    types:
                      - name: platformUrl
                        label: "Square Link"
                        widget: object
                        required: true
                        fields:
                          - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                          - { name: href, label: "URL", widget: string, required: true }

                      - name: moduleInfo
                        label: "Module Info"
                        widget: object
                        fields:
                          - name: enabled
                            label: "Enabled?"
                            widget: boolean
                            required: true
                            default: true
                            hint: "Toggle on to show the Square Appointments embed on this person's page &/ booking section."
                          - name: merchantId
                            label: "Merchant ID"
                            widget: string
                            required: true
                            hint: "From your Square embed snippet (e.g., 'DM7VKY8Q63GNP')."
                            pattern: [ '^[A-Za-z0-9-]+$', "Use letters, numbers, and dashes. Case-sensitive." ]
                          - name: locationId
                            label: "Location ID"
                            widget: string
                            required: true
                            hint: "From your Square embed snippet (e.g., '7WQ0KXC8ZSD90')."
                            pattern: [ '^[A-Za-z0-9-]+$', "Use letters, numbers, and dashes. Case-sensitive." ]
                          - name: label
                            label: "Button Label"
                            widget: string
                            required: false
                            default: "Book an appointment"

          - name: bookingNote
            label: "General Booking Note"
            widget: "text"
            required: false
            hint: "Example: 'For tattoo inquiries, Sierra prefers Facebook Messenger.'"

      - name: images
        label: "Portfolio Images"
        widget: image
        multiple: true

      - { name: body, label: "Long Bio (Page Content)", widget: markdown, required: false }

  - name: "aftercare"
    label: "Aftercare"
    files:
      - name: "main"
        label: "Aftercare Content"
        file: "src/content/aftercare/main.md"
        format: "frontmatter"
        fields:
          - { name: title, label: Title, widget: string, default: "Aftercare" }
          - { name: body, label: Body, widget: markdown }

  - name: "siteInfo"
    label: "Site Info"
    files:
      - name: "main"
        label: "Main"
        file: "src/content/siteInfo/main.json"
        format: "json"
        fields:
          - { name: siteName, label: "Site Name", widget: string, default: "BluTattoo Studio" }
          - name: "address"
            label: "Address"
            widget: "object"
            fields:
            - { name: "streetAddress", label: "Street", widget: "string" }
            - { name: "addressLocality", label: "City", widget: "string" }
            - name: "addressRegion"
              label: "State"
              widget: "string"
              hint: "2-letter USPS state code (e.g., VA; CA)"
              pattern: [ "^[A-Z]{2}$", "Use 2-letter state code (e.g., VA; CA)" ]
            - name: "postalCode"
              label: "ZIP"
              widget: "string"
              hint: "5-digit ZIP or ZIP+4 (e.g., 12345 or 12345-6789)"
              pattern: ["^\\d{5}(-\\d{4})?$", "Use 5-digit ZIP or ZIP+4 (e.g., 12345 or 12345-6789)"]
            - name: "addressCountry"
              label: "Country Code"
              widget: "string"
              default: "US"
              hint: "ISO 3166-1 alpha-2 country code (eg., US)"
              pattern: ["^[A-Z]{2}$", "Must be a 2-letter ISO 3166-1 alpha-2 country code (eg., US)"]
          - name: phone
            label: "Phone Number"
            widget: string
            required: false
            hint: "Enter a 10-digit US number including area code. Example: (555) 123-4567"
            pattern:
              [
                "^(?:\\+?1[-.\\s]?)?(?:\\(?\\d{3}\\)?[-.\\s]?)\\d{3}[-.\\s]?\\d{4}$",
                "Enter a valid US phone number with area code, such as (555) 123-4567 or 555-123-4567."
              ]
          - { name: email, label: "Email", widget: string, required: false }

          - name: hours
            label: "Hours"
            widget: list
            required: false
            fields:
              - { name: label, label: "Day", widget: string }
              - { name: value, label: "Hours", widget: string }

          - name: socials
            label: "Socials"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - { name: instagram, label: "Instagram", widget: "string", required: false }
              - { name: tiktok, label: "TikTok", widget: "string", required: false }
              - { name: youtube, label: "YouTube", widget: "string", required: false }
              - { name: facebook, label: "Facebook", widget: "string", required: false }
              - { name: x, label: "X (Twitter)", widget: "string", required: false }
              - { name: threads, label: "Threads", widget: "string", required: false }
              - { name: tumblr, label: "Tumblr", widget: "string", required: false }
              - { name: pinterest, label: "Pinterest", widget: "string", required: false }

  - name: "branding"
    label: "Branding"
    files:
      - name: "main"
        label: "Branding"
        file: "src/content/branding.json"
        format: "json"
        fields:
          - name: logoDark
            label: "Logo (SVG or PNG, dark version)"
            widget: image
            required: true
            hint: "Header logo (dark-on-light version)."
            media_folder: "public/uploads/misc_images/logos"
            public_folder: "/uploads/misc_images/logos"

          - name: logoLight
            label: "Logo (SVG or PNG, light version)"
            widget: image
            required: false
            hint: "Header logo (light-on-dark version)."
            media_folder: "public/uploads/misc_images/logos"
            public_folder: "/uploads/misc_images/logos"

          - name: hero
            label: "Hero"
            widget: object
            required: false
            fields:
              - name: video
                label: "Video"
                widget: object
                required: false
                fields:
                  - name: mp4
                    label: "MP4"
                    widget: file
                    required: true
                    hint: "Fallback format for most browsers."
                    media_folder: "public/uploads/misc_videos"
                    public_folder: "/uploads/misc_videos"

                  - name: webm
                    label: "WebM"
                    widget: file
                    required: false
                    hint: "Smaller/faster in supported browsers."
                    media_folder: "public/uploads/misc_videos"
                    public_folder: "/uploads/misc_videos"

                  - name: poster
                    label: "Poster image"
                    widget: image
                    required: false
                    hint: "Shown before video loads / if autoplay fails."
                    media_folder: "public/uploads/misc_images"
                    public_folder: "/uploads/misc_images"

  - name: "eventsActive"
    label: "Events (Active)"
    folder: "src/content/events"
#    path: "{{year}}/{{month}}/{{day}}/{{slug}}/index"
    path: "{{date | date('YYYY')}}/{{date | date('MMM')}}/{{slug}}/index"
    media_folder: ""
    public_folder: ""
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    filter: { field: "archived", value: false }
    summary: "{{date}} — {{title}}"
    sortable_fields: [ "date", "title", "guestSpot", "commit_date" ]
    description: "Create events for guest spots, flash days, and other shop happenings."
    view_filters:
      - field: guestSpot.guestName
        label: "Guest Spot"
        pattern: ".+"
      - label: Featured Status
        field: featured
        pattern: true
    fields:
      - name: guestSpot
        label: "Guest Spot"
        summary: "{{guestName}}"
        hint: "(If this event is not a guest spot, ignore this section.)"
        required: false
        widget: object
        fields:
          - { name: guestName, label: "Guest Name", widget: string }
          - { name: runwayPhoto, label: "Runway Photo (Front Page)", widget: image, required: false }
          - name: runwayPhotoFrame
            label: "Frame for Runway Photo"
            widget: select
            options: [ "none", "squareframe3" ]
            default: "squareframe3"
          - name: primaryRole
            label: "Primary Role"
            widget: select
            options:
              - { label: "Tattoo Artist", value: "Tattoo Artist" }
              - { label: "Piercer", value: "Piercer" }
          - name: "contactSocialsBooking"
            label: "Contact, Socials, & Booking"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - { name: bookingProfilePicture, label: "Profile Picture (Booking Page)", widget: image, required: false }
              - { name: booksOpen, label: "Are books open?", widget: boolean, default: true, required: true }
              - { name: booksClosedNote, label: "Closed Books Note", widget: text, required: true, default: "Books are currently closed.", hint: "Only active when books are not open. eg: 'books closed until April'" }
              - name: contact
                label: "Contact"
                required: false
                widget: list
                min: 0
                types:
                  - name: "phone"
                    label: "phone"
                    widget: object
                    required: true
                    collapsed: false
                    fields:
                      - name: href
                        label: "Phone Number"
                        widget: string
                        required: true
                        hint: "Enter a 10-digit US number including area code. Example: (555) 123-4567"
                        pattern:
                          [
                            "^(?:\\+?1[-.\\s]?)?(?:\\(?\\d{3}\\)?[-.\\s]?)\\d{3}[-.\\s]?\\d{4}$",
                            "Enter a valid US phone number with area code, such as (555) 123-4567 or 555-123-4567."
                          ]
                      - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                      - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                      - { name: notes, label: Notes, widget: text, required: false, hint: "number type, text or call, times available, etc" }

                  - name: "email"
                    label: "email"
                    widget: object
                    required: true
                    collapsed: false
                    fields:
                      - { name: href, label: "Email Address", widget: string, required: true }
                      - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                      - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                      - { name: notes, label: Notes, widget: text, required: false, hint: "lead times, subject header, etc" }

                  - name: "website"
                    label: "website"
                    widget: object
                    required: true
                    collapsed: false
                    fields:
                      - { name: href, label: "URL", widget: string, required: true }
                      - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                      - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                      - { name: notes, label: Notes, widget: text, required: false, hint: "external website" }

              - name: socials
                label: "Social Media Links"
                required: false
                widget: list
                min: 0
                types:
                  - name: "instagram"
                    label: "Instagram"
                    widget: object
                    required: true
                    collapsed: false
                    fields:
                      - { name: href, label: "URL", widget: string, required: true }
                      - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                      - { name: bookable, label: "List as a bookable channel of communication?", widget: boolean, default: false, required: true }
                      - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                      - { name: handle, label: "Username/Handle", widget: text, required: false }

                  - name: "facebook"
                    label: "Facebook"
                    widget: object
                    required: true
                    collapsed: false
                    fields:
                      - { name: href, label: "URL", widget: string, required: true }
                      - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                      - { name: bookable, label: "List as a bookable channel of communication?", widget: boolean, default: false, required: true }
                      - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                      - { name: handle, label: "Username/Handle", widget: text, required: false }

                  - name: "tiktok"
                    label: "TikTok"
                    widget: object
                    required: true
                    collapsed: false
                    fields:
                      - { name: href, label: "URL", widget: string, required: true }
                      - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                      - { name: bookable, label: "List as a bookable channel of communication?", widget: boolean, default: false, required: true }
                      - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                      - { name: handle, label: "Username/Handle", widget: text, required: false }

                  - name: "x"
                    label: "X (Twitter)"
                    widget: object
                    required: true
                    collapsed: false
                    fields:
                      - { name: href, label: "URL", widget: string, required: true }
                      - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                      - { name: bookable, label: "List as a bookable channel of communication?", widget: boolean, default: false, required: true }
                      - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                      - { name: handle, label: "Username/Handle", widget: text, required: false }

                  - name: "threads"
                    label: "Threads"
                    widget: object
                    required: true
                    collapsed: false
                    fields:
                      - { name: href, label: "URL", widget: string, required: true }
                      - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                      - { name: bookable, label: "List as a bookable channel of communication?", widget: boolean, default: false, required: true }
                      - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                      - { name: handle, label: "Username/Handle", widget: text, required: false }

                  - name: "tumblr"
                    label: "Tumblr"
                    widget: object
                    required: true
                    collapsed: false
                    fields:
                      - { name: href, label: "URL", widget: string, required: true }
                      - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                      - { name: bookable, label: "List as a bookable channel of communication?", widget: boolean, default: false, required: true }
                      - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                      - { name: handle, label: "Username/Handle", widget: text, required: false }

                  - name: "youtube"
                    label: "YouTube"
                    widget: object
                    required: true
                    collapsed: false
                    fields:
                      - { name: href, label: "URL", widget: string, required: true }
                      - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                      - { name: bookable, label: "List as a bookable channel of communication?", widget: boolean, default: false, required: true }
                      - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                      - { name: handle, label: "Username/Handle", widget: text, required: false }

                  - name: "pinterest"
                    label: "Pinterest"
                    widget: object
                    required: true
                    collapsed: false
                    fields:
                      - { name: href, label: "URL", widget: string, required: true }
                      - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                      - { name: bookable, label: "List as a bookable channel of communication?", widget: boolean, default: false, required: true }
                      - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                      - { name: handle, label: "Username/Handle", widget: text, required: false }

              - name: platforms
                label: "Platforms"
                required: false
                widget: list
                min: 0
                types:
                  - name: square
                    label: "Square Appointments"
                    widget: object
                    required: true
                    collapsed: false
                    fields:
                      - { name: enabled, label: "Enabled?", widget: boolean, default: true, required: true }
                      - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                      - name: linkOrModuleInfo
                        label: "Simple link or Square module info"
                        widget: list
