      - { name: alt, label: Hero Image Alt Text, widget: string, required: false }
      - { name: published, label: Published, widget: boolean, default: true }
      - { name: featured, label: Featured, widget: boolean, required: false, default: false }
      - { name: archived, label: Archived, widget: boolean, required: false, default: true }

      # DATE RANGE (inclusive endDate)
      - name: startDate
        label: Start Date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        # picker_utc: false  # optional

      - name: endDate
        label: End Date (inclusive, optional)
        widget: datetime
        required: false
        date_format: YYYY-MM-DD
        time_format: false
        # picker_utc: false  # optional

      # OPTIONAL TIME WINDOW (if omitted => all-day)
      - name: startTime
        label: Start Time (optional)
        widget: datetime
        required: false
        date_format: false
        time_format: "HH:mm"

      - name: endTime
        label: End Time (optional)
        widget: datetime
        required: false
        date_format: false
        time_format: "HH:mm"

      - { name: location, label: Location, widget: string, required: false }

      - label: 'Recurrence (optional - add only one rule)'
        name: 'recurrenceRule'
        widget: 'list'
        min: 0
        max: 1
        types:
          - label: 'Recurrence - Weekly'
            name: 'recurrenceRuleWeekly'
            widget: object
            required: false
            collapsed: true
            hint: "Repeats on selected weekdays between Start Date and End Date."
            fields:
              - label: Interval
                name: interval
                widget: number
                required: false
                default: 1
                value_type: int
                min: 1
                hint: "Every 1 week, every 2 weeks, etc."

              - label: Weekdays
                name: byWeekday
                widget: select
                multiple: true
                required: true
                options:
                  - { label: Mon, value: MO }
                  - { label: Tue, value: TU }
                  - { label: Wed, value: WE }
                  - { label: Thu, value: TH }
                  - { label: Fri, value: FR }
                  - { label: Sat, value: SA }
                  - { label: Sun, value: SU }

          - label: 'Recurrence - Monthly'
            name: 'recurrenceRuleMonthly'
            widget: object
            required: false
            collapsed: true
            hint: "Repeats monthly between Start Date and End Date."
            fields:
              - label: Interval
                name: interval
                widget: number
                required: false
                default: 1
                value_type: int
                min: 1
                hint: "Every 1 month, every 2 months, etc."

              - label: Monthly Mode
                name: monthlyMode
                widget: select
                required: true
                default: monthday
                options:
                  - { label: "Same day of month", value: monthday }
                  - { label: "Ordinal weekday", value: ordinalWeekday }

              - label: Day of month
                name: byMonthDay
                widget: number
                required: false
                value_type: int
                min: 1
                max: 31
                hint: "Use for 'Same day of month' mode, e.g. 15"

              - label: Weekday
                name: byWeekday
                widget: select
                required: false
                options:
                  - { label: Mon, value: MO }
                  - { label: Tue, value: TU }
                  - { label: Wed, value: WE }
                  - { label: Thu, value: TH }
                  - { label: Fri, value: FR }
                  - { label: Sat, value: SA }
                  - { label: Sun, value: SU }
                hint: "Use for 'Ordinal weekday' mode"

              - label: Position in month
                name: bySetPos
                widget: select
                required: false
                options:
                  - { label: First, value: 1 }
                  - { label: Second, value: 2 }
                  - { label: Third, value: 3 }
                  - { label: Fourth, value: 4 }
                  - { label: Last, value: -1 }
                hint: "Use for 'Ordinal weekday' mode"

      - label: "Promo Bar (optional)"
        name: promoBar
        widget: object
        required: false
        collapsed: true
        fields:
          - { name: enabled, label: Enable Promo Bar, widget: boolean, default: false }
          - { name: message, label: Message, widget: string, required: false }
          - { name: href, label: Link URL, widget: string, required: false }

          - label: "Color 1"
            name: color1
            widget: color
            required: false
            hint: "If only one color is set, bar uses a solid background."

          - label: "Color 2"
            name: color2
            widget: color
            required: false
            hint: "If two colors are set, bar uses a left→right gradient."

      - { name: body, label: Details (long - event page), widget: markdown, required: false }

  - name: "imagetest"
    label: "Image Test"
    folder: "src/content/imagetest"
    create: true
    slug: "{{slug}}"
    media_folder: "/public/uploads/misc_images/imagetest"
    public_folder: "/uploads/misc_images/imagetest"
    fields:
      - { name: "title", label: "Title", widget: "string" }

      - name: "image"
        label: "Test Image"
        widget: "image"