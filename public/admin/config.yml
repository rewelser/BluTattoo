# Uncomment for local editing without GitHub:
local_backend: true

backend:
  name: github
  repo: rewelser/BluTattoo         # ← change me
  branch: main                             # ← change if not main
  site_domain: blu-tattoo.vercel.app              # ← your production domain (no protocol)
  base_url: https://blu-tattoo.vercel.app         # ← your production URL (with protocol)
  auth_endpoint: oauth                     # ← provided by the integration

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "faqs"
    label: "FAQs"
    folder: "src/content/faqs"
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: q, label: Question, widget: string }
      - { name: a, label: Answer, widget: text }
      - { name: sort, label: Sort, widget: number, required: false }

  - name: "people"
    label: "People"
    folder: "src/content/people"
    create: true
    identifier_field: name
    slug: "{{slug}}"
    media_folder: "/public/uploads/people"
    public_folder: "/uploads/people"
    fields:
      - { name: name, label: Name, widget: string }
      - {name: active, label: "Active", widget: boolean, default: true, required: true}
      - {name: guest, label: "Guest", widget: boolean, default: false, required: true}
      - { name: order, label: "List Order", widget: number, default: 999 }
      - { name: page_photo, label: Photo (on Artist or Piercing Page), widget: image, required: false }
      - { name: runway_photo, label: "Runway Photo (Front Page)", widget: image, required: false }
      - name: primary_role
        label: Primary Role
        widget: select
        options:
          - { label: "Tattoo Artist", value: "tattoo_artist" }
          - { label: "Piercer", value: "piercer" }

      - name: "contact_socials_booking"
        label: "Contact, Socials, & Booking"
        widget: "object"
        required: false
        collapsed: false
        fields:
        - { name: booking_profile_picture, label: "Profile Picture (Booking Page)", widget: image, required: false }
        - name: contact
          label: Contact
          widget: list
          min: 0
          types:
            - name: "phone"
              label: "phone"
              widget: object
              required: true
              collapsed: false
              fields:
                - {name: number, label: Phone Number, widget: string, required: true}
                - {name: enabled, label: "Enabled?", widget: boolean, default: true, required: true}
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                - {name: notes, label: Notes, widget: text, required: false, hint: "number type, text or call, times available, etc"}

            - name: "email"
              label: "email"
              widget: object
              required: true
              collapsed: false
              fields:
                - {name: email_address, label: Email Address, widget: string, required: true}
                - {name: enabled, label: "Enabled?", widget: boolean, default: true, required: true}
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                - {name: notes, label: Notes, widget: text, required: false, hint: "lead times, subject header, etc"}

            - name: "website"
              label: "Website"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: link, label: Link, widget: string, required: true }
                - {name: enabled, label: "Enabled?", widget: boolean, default: true, required: true}
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }
                - {name: notes, label: Notes, widget: text, required: false, hint: "lead times, subject header, etc"}

        - name: 'socials'
          label: 'Social Media Links'
          widget: 'list'
          min: 0
          types:
            - name: "instagram"
              label: "Instagram"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: link, label: Link, widget: string, required: true }
                - {name: enabled, label: "Enabled?", widget: boolean, default: true, required: true}
                - { name: bookable, label: "Allow Contact?", widget: boolean, default: false, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }

            - name: "facebook"
              label: "Facebook"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: link, label: Link, widget: string, required: true }
                - {name: enabled, label: "Enabled?", widget: boolean, default: true, required: true}
                - { name: bookable, label: "Allow Contact?", widget: boolean, default: false, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }

            - name: "tiktok"
              label: "TikTok"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: link, label: Link, widget: string, required: true }
                - {name: enabled, label: "Enabled?", widget: boolean, default: true, required: true}
                - { name: bookable, label: "Allow Contact?", widget: boolean, default: false, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }

            - name: "x"
              label: "X (Twitter)"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: link, label: Link, widget: string, required: true }
                - {name: enabled, label: "Enabled?", widget: boolean, default: true, required: true}
                - { name: bookable, label: "Allow Contact?", widget: boolean, default: false, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }

            - name: "threads"
              label: "Threads"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: link, label: Link, widget: string, required: true }
                - {name: enabled, label: "Enabled?", widget: boolean, default: true, required: true}
                - { name: bookable, label: "Allow Contact?", widget: boolean, default: false, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }

            - name: "tumblr"
              label: "Tumblr"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: link, label: Link, widget: string, required: true }
                - {name: enabled, label: "Enabled?", widget: boolean, default: true, required: true}
                - { name: bookable, label: "Allow Contact?", widget: boolean, default: false, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }

            - name: "youtube"
              label: "YouTube"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: link, label: Link, widget: string, required: true }
                - {name: enabled, label: "Enabled?", widget: boolean, default: true, required: true}
                - { name: bookable, label: "Allow Contact?", widget: boolean, default: false, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }

            - name: "pinterest"
              label: "Pinterest"
              widget: object
              required: true
              collapsed: false
              fields:
                - { name: link, label: Link, widget: string, required: true }
                - {name: enabled, label: "Enabled?", widget: boolean, default: true, required: true}
                - { name: bookable, label: "Allow Contact?", widget: boolean, default: false, required: true }
                - { name: preferred, label: "Is this the preferred contact/booking method?", widget: boolean, required: false }

        - name: 'platforms'
          label: 'Platforms'
          widget: 'list'
          min: 0
          types:
          - name: square
            label: "Square Appointments"
            widget: object
            required: true
            collapsed: false
            fields:
              - {name: enabled, label: "Enabled?", widget: boolean, default: true, required: true}
              - name: 'link_or_module_info'
                label: 'Simple link or Square module info'
                widget: 'list'
                min: 1
                types:
                - name: square_link
                  label: "Square Link"
                  widget: object
                  required: true
                  fields:
                  - {name: enabled, label: "Enabled?", widget: boolean, default: true, required: true}
                  - {name: url, label: URL, widget: string, required: true}

                - name: module_info
                  label: Module Info
                  widget: object
                  fields:
                  - name: enabled
                    label: Enabled?
                    widget: boolean
                    required: true
                    default: true
                    hint: "Toggle on to show the Square Appointments embed on this person's page &/ booking section."
                  - name: merchantId
                    label: Merchant ID
                    widget: string
                    required: true
                    hint: 'From your Square embed snippet (e.g., "DM7VKY8Q63GNP").'
                    pattern: ['^[A-Za-z0-9-]+$', "Use letters, numbers, and dashes. Case-sensitive."]
                  - name: locationId
                    label: Location ID
                    widget: string
                    required: true
                    hint: 'From your Square embed snippet (e.g., "7WQ0KXC8ZSD90").'
                    pattern: ['^[A-Za-z0-9-]+$', "Use letters, numbers, and dashes. Case-sensitive."]
                  - name: label
                    label: Button Label
                    widget: string
                    required: false
                    default: "Book an appointment"

        - name: booking_note
          label: "General Booking Note"
          widget: "text"
          required: false
          hint: 'Example: "For tattoo inquiries, Sierra prefers Facebook Messenger."'

      - label: Portfolio Images
        name: images
        widget: list
        required: false
        fields:
          - { name: src, label: Image, widget: image }
          - { name: alt, label: Alt text, widget: string, required: false }

      - { name: body, label: Long Bio (Page Content), widget: markdown, required: false }

  - name: "aftercare"
    label: "Aftercare"
    files:
      - name: "main"
        label: "Aftercare Content"
        file: "src/content/aftercare/main.md"
        format: "frontmatter"
        fields:
          - { name: title, label: Title, widget: string, default: "Aftercare" }
          - { name: body, label: Body, widget: markdown }

  - name: "siteInfo"
    label: "Site Info"
    files:
      - name: "main"
        label: "Main"
        file: "src/content/siteInfo/main.json"
        format: "json"
        fields:
          - { name: siteName, label: Site Name, widget: string, default: "BluTattoo Studio" }
          - { name: address, label: Address (single line), widget: string }
          - { name: phone, label: Phone, widget: string, required: false }
          - { name: email, label: Email, widget: string, required: false }

          - label: Hours
            name: hours
            widget: list
            required: false
            fields:
              - { name: label, label: Day, widget: string }
              - { name: value, label: Hours, widget: string }

          - label: "Socials"
            name: "socials"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - { label: "Instagram", name: "instagram", widget: "string", required: false }
              - { label: "TikTok", name: "tiktok", widget: "string", required: false }
              - { label: "YouTube", name: "youtube", widget: "string", required: false }
              - { label: "Facebook", name: "facebook", widget: "string", required: false }
              - { label: "X (Twitter)", name: "x", widget: "string", required: false }
              - { label: "Threads", name: "threads", widget: "string", required: false }
              - { label: "Tumblr", name: "tumblr", widget: "string", required: false }
              - { label: "Pinterest", name: "pinterest", widget: "string", required: false }

  - name: "branding"
    label: "Branding"
    files:
      - name: "main"
        label: "Branding"
        file: "src/content/branding.json"
        format: "json"
        fields:
          - label: Logo (SVG or PNG, dark version)
            name: logo_dark
            widget: image
            required: true
            hint: "Header logo (dark-on-light version)."
            media_folder: "public/uploads/misc_images/logos"
            public_folder: "/uploads/misc_images/logos"

          - label: Logo (SVG or PNG, light version)
            name: logo_light
            widget: image
            required: false
            hint: "Header logo (light-on-dark version)."
            media_folder: "public/uploads/misc_images/logos"
            public_folder: "/uploads/misc_images/logos"

          - label: Hero
            name: hero
            widget: object
            required: false
            fields:
              - label: Video
                name: video
                widget: object
                required: false
                fields:
                  - label: MP4
                    name: mp4
                    widget: file
                    required: true
                    hint: "Fallback format for most browsers."
                    media_folder: "public/uploads/misc_videos"
                    public_folder: "/uploads/misc_videos"

                  - label: WebM
                    name: webm
                    widget: file
                    required: false
                    hint: "Smaller/faster in supported browsers."
                    media_folder: "public/uploads/misc_videos"
                    public_folder: "/uploads/misc_videos"

                  - label: Poster image
                    name: poster
                    widget: image
                    required: false
                    hint: "Shown before video loads / if autoplay fails."
                    media_folder: "public/uploads/misc_images"
                    public_folder: "/uploads/misc_images"

  - name: "home"
    label: "Homepage"
    files:
      - name: "main"
        label: "Homepage Content"
        file: "src/content/home/main.json"
        format: "json"
        fields:
          - label: "Promo (main)"
            name: promoMain
            widget: object
            required: false
            collapsed: true
            hint: "Toggle on to put a promo image on the home page."
            fields:
              - { name: promoEnabled, label: "Enable Promo", widget: boolean, default: true }

              - label: "Promo Image"
                name: promoImage
                widget: image
                required: false
                media_folder: "/public/uploads/promos"
                public_folder: "/uploads/promos"
                hint: "Recommended: wide image (e.g. 1600×900+)"

              - { name: promoAlt, label: "Image Alt Text", widget: string, required: false }
              
  - name: "events_active"
    label: "Events (Active)"
    folder: "src/content/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: "frontmatter"
    filter: { field: "archived", value: false }
    summary: "{{startDate}} — {{title}}"
    sortable_fields: ["startDate", "title", "commit_date"]
    fields:
      - { name: title, label: Title, widget: string }
      - { name: detailsShort, label: Details (short), widget: string, required: false }
      - label: "Hero Image"
        name: image
        widget: image
        required: false
        media_folder: "/public/uploads/events"
        public_folder: "/uploads/events"
      - { name: alt, label: Hero Image Alt Text, widget: string, required: false }
      - { name: published, label: Published, widget: boolean, default: true }
      - { name: featured, label: Featured, widget: boolean, required: false, default: false }
      - { name: archived, label: Archived, widget: boolean, required: false, default: false }

      # DATE RANGE (inclusive endDate)
      - name: startDate
        label: Start Date
        widget: datetime
        date_format: "YYYY-MM-DD"
        time_format: false
        # picker_utc: false  # optional

      - name: endDate
        label: End Date (inclusive, optional)
        widget: datetime
        required: false
        date_format: "YYYY-MM-DD"
        time_format: false
        # picker_utc: false  # optional

      # OPTIONAL TIME WINDOW (if omitted => all-day)
      - name: startTime
        label: Start Time (optional)
        widget: datetime
        required: false
        date_format: false
        time_format: "HH:mm"

      - name: endTime
        label: End Time (optional)
        widget: datetime
        required: false
        date_format: false
        time_format: "HH:mm"

      - { name: location, label: Location, widget: string, required: false }

      - label: 'Recurrence (optional - add only one rule)'
        name: 'recurrenceRule'
        widget: 'list'
        min: 0
        max: 1
        types:
          - label: 'Recurrence - Weekly'
            name: 'recurrenceRuleWeekly'
            widget: object
            required: false
            collapsed: true
            hint: "Repeats on selected weekdays between Start Date and End Date."
            fields:
              - label: Interval
                name: interval
                widget: number
                required: false
                default: 1
                value_type: int
                min: 1
                hint: "Every 1 week, every 2 weeks, etc."

              - label: Weekdays
                name: byWeekday
                widget: select
                multiple: true
                required: true
                options:
                  - { label: Mon, value: MO }
                  - { label: Tue, value: TU }
                  - { label: Wed, value: WE }
                  - { label: Thu, value: TH }
                  - { label: Fri, value: FR }
                  - { label: Sat, value: SA }
                  - { label: Sun, value: SU }

          - label: 'Recurrence - Monthly'
            name: 'recurrenceRuleMonthly'
            widget: object
            required: false
            collapsed: true
            hint: "Repeats monthly between Start Date and End Date."
            fields:
              - label: Interval
                name: interval
                widget: number
                required: false
                default: 1
                value_type: int
                min: 1
                hint: "Every 1 month, every 2 months, etc."

              - label: Monthly Mode
                name: monthlyMode
                widget: select
                required: true
                default: monthday
                options:
                  - { label: "Same day of month", value: monthday }
                  - { label: "Ordinal weekday", value: ordinalWeekday }

              - label: Day of month
                name: byMonthDay
                widget: number
                required: false
                value_type: int
                min: 1
                max: 31
                hint: "Use for 'Same day of month' mode, e.g. 15"

              - label: Weekday
                name: byWeekday
                widget: select
                required: false
                options:
                  - { label: Mon, value: MO }
                  - { label: Tue, value: TU }
                  - { label: Wed, value: WE }
                  - { label: Thu, value: TH }
                  - { label: Fri, value: FR }
                  - { label: Sat, value: SA }
                  - { label: Sun, value: SU }
                hint: "Use for 'Ordinal weekday' mode"

              - label: Position in month
                name: bySetPos
                widget: select
                required: false
                options:
                  - { label: First, value: 1 }
                  - { label: Second, value: 2 }
                  - { label: Third, value: 3 }
                  - { label: Fourth, value: 4 }
                  - { label: Last, value: -1 }
                hint: "Use for 'Ordinal weekday' mode"

      - label: "Promo Bar (optional)"
        name: promoBar
        widget: object
        required: false
        collapsed: true
        fields:
          - { name: enabled, label: Enable Promo Bar, widget: boolean, default: false }
          - { name: message, label: Message, widget: string, required: false }
          - { name: href, label: Link URL, widget: string, required: false }

          - label: "Color 1"
            name: color1
            widget: color
            required: false
            hint: "If only one color is set, bar uses a solid background."

          - label: "Color 2"
            name: color2
            widget: color
            required: false
            hint: "If two colors are set, bar uses a left→right gradient."

      - { name: body, label: Details (long - event page), widget: markdown, required: false }

  - name: "events_archive"
    label: "Events (Archive)"
    folder: "src/content/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: "frontmatter"
    filter: { field: "archived", value: true }
    summary: "{{startDate}} — {{title}}"
    sortable_fields: ["startDate", "title", "commit_date"]
    fields:
      - { name: title, label: Title, widget: string }
      - { name: detailsShort, label: Details (short), widget: string, required: false }
      - label: "Hero Image"
        name: image
        widget: image
        required: false
        media_folder: "/public/uploads/events"
        public_folder: "/uploads/events"
      - { name: alt, label: Hero Image Alt Text, widget: string, required: false }
      - { name: published, label: Published, widget: boolean, default: true }
      - { name: featured, label: Featured, widget: boolean, required: false, default: false }
      - { name: archived, label: Archived, widget: boolean, required: false, default: true }

      # DATE RANGE (inclusive endDate)
      - name: startDate
        label: Start Date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        # picker_utc: false  # optional

      - name: endDate
        label: End Date (inclusive, optional)
        widget: datetime
        required: false
        date_format: YYYY-MM-DD
        time_format: false
        # picker_utc: false  # optional

      # OPTIONAL TIME WINDOW (if omitted => all-day)
      - name: startTime
        label: Start Time (optional)
        widget: datetime
        required: false
        date_format: false
        time_format: "HH:mm"

      - name: endTime
        label: End Time (optional)
        widget: datetime
        required: false
        date_format: false
        time_format: "HH:mm"

      - { name: location, label: Location, widget: string, required: false }

      - label: 'Recurrence (optional - add only one rule)'
        name: 'recurrenceRule'
        widget: 'list'
        min: 0
        max: 1
        types:
          - label: 'Recurrence - Weekly'
            name: 'recurrenceRuleWeekly'
            widget: object
            required: false
            collapsed: true
            hint: "Repeats on selected weekdays between Start Date and End Date."
            fields:
              - label: Interval
                name: interval
                widget: number
                required: false
                default: 1
                value_type: int
                min: 1
                hint: "Every 1 week, every 2 weeks, etc."

              - label: Weekdays
                name: byWeekday
                widget: select
                multiple: true
                required: true
                options:
                  - { label: Mon, value: MO }
                  - { label: Tue, value: TU }
                  - { label: Wed, value: WE }
                  - { label: Thu, value: TH }
                  - { label: Fri, value: FR }
                  - { label: Sat, value: SA }
                  - { label: Sun, value: SU }

          - label: 'Recurrence - Monthly'
            name: 'recurrenceRuleMonthly'
            widget: object
            required: false
            collapsed: true
            hint: "Repeats monthly between Start Date and End Date."
            fields:
              - label: Interval
                name: interval
                widget: number
                required: false
                default: 1
                value_type: int
                min: 1
                hint: "Every 1 month, every 2 months, etc."

              - label: Monthly Mode
                name: monthlyMode
                widget: select
                required: true
                default: monthday
                options:
                  - { label: "Same day of month", value: monthday }
                  - { label: "Ordinal weekday", value: ordinalWeekday }

              - label: Day of month
                name: byMonthDay
                widget: number
                required: false
                value_type: int
                min: 1
                max: 31
                hint: "Use for 'Same day of month' mode, e.g. 15"

              - label: Weekday
                name: byWeekday
                widget: select
                required: false
                options:
                  - { label: Mon, value: MO }
                  - { label: Tue, value: TU }
                  - { label: Wed, value: WE }
                  - { label: Thu, value: TH }
                  - { label: Fri, value: FR }
                  - { label: Sat, value: SA }
                  - { label: Sun, value: SU }
                hint: "Use for 'Ordinal weekday' mode"

              - label: Position in month
                name: bySetPos
                widget: select
                required: false
                options:
                  - { label: First, value: 1 }
                  - { label: Second, value: 2 }
                  - { label: Third, value: 3 }
                  - { label: Fourth, value: 4 }
                  - { label: Last, value: -1 }
                hint: "Use for 'Ordinal weekday' mode"

      - label: "Promo Bar (optional)"
        name: promoBar
        widget: object
        required: false
        collapsed: true
        fields:
          - { name: enabled, label: Enable Promo Bar, widget: boolean, default: false }
          - { name: message, label: Message, widget: string, required: false }
          - { name: href, label: Link URL, widget: string, required: false }

          - label: "Color 1"
            name: color1
            widget: color
            required: false
            hint: "If only one color is set, bar uses a solid background."

          - label: "Color 2"
            name: color2
            widget: color
            required: false
            hint: "If two colors are set, bar uses a left→right gradient."

      - { name: body, label: Details (long - event page), widget: markdown, required: false }

  - name: "imagetest"
    label: "Image Test"
    folder: "src/content/imagetest"
    create: true
    slug: "{{slug}}"
    # media_folder: "/public/uploads/misc_images/imagetest"
    media_folder: "src/assets/images"
    public_folder: "src/assets/images"
    # public_folder: "/uploads/misc_images/imagetest"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: src, label: Test Image, widget: image }
      - { name: alt, label: Alt text, widget: string }